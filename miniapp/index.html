<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CARAVAN TRANZIT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="./style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Public Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* App container ko'rinishini kafolatlash */
        .app-container { display: flex !important; }
    </style>
</head>
<body>

    <div class="app-container" id="appContainer">
        <header class="app-header" id="appHeader">
            <div class="header-left">
                <button class="back-btn" id="headerBackBtn" style="display: none;">
                    <span>←</span>
                </button>
                <div class="header-logo">
                    <span class="logo-icon">🚛</span>
                    <span class="logo-text">CARAVAN TRANZIT</span>
                </div>
            </div>
            <div class="header-right">
                <button class="profile-btn" id="profileBtn">👤</button>
            </div>
        </header>

        <main class="app-main" id="appMain">
            <div class="screen active" id="homeScreen">
                <div class="wallet-card">
                    <div class="wallet-content">
                        <div class="wallet-info">
                            <p class="wallet-label">Tangalarim</p>
                            <div class="wallet-balance">
                                <h2 class="wallet-value" id="coinsValue">35,000</h2>
                                <span class="wallet-currency">UZS equivalent</span>
                            </div>
                        </div>
                        <button class="wallet-add-btn" onclick="navigateTo('bonusScreen')">
                            <span class="material-symbols-outlined">add</span>
                        </button>
                    </div>
                    <div class="wallet-glow"></div>
                </div>

                <section class="services-section-new">
                    <h3 class="section-title-home">Xizmatlar</h3>
                    <div class="services-grid">
                        <button class="service-card-new" onclick="startEPIFlow()">
                            <div class="service-icon-wrapper purple">
                                <span class="material-symbols-outlined">assignment</span>
                            </div>
                            <span class="service-name-new">EPI</span>
                        </button>
                        <button class="service-card-new" onclick="startMBFlow()">
                            <div class="service-icon-wrapper indigo">
                                <span class="material-symbols-outlined">shield</span>
                            </div>
                            <span class="service-name-new">MB</span>
                        </button>
                        <button class="service-card-new" onclick="showKGDScreen()">
                            <div class="service-icon-wrapper blue">
                                <span class="material-symbols-outlined">language</span>
                            </div>
                            <span class="service-name-new">KGD</span>
                        </button>
                        <button class="service-card-new" onclick="showApplicationsScreen()">
                            <div class="service-icon-wrapper emerald">
                                <span class="material-symbols-outlined">content_paste</span>
                            </div>
                            <span class="service-name-new">Arizalarim</span>
                        </button>
                    </div>
                </section>

                <section class="recent-apps-section">
                    <div class="recent-apps-header">
                        <h3 class="section-title-home">Oxirgi arizalar</h3>
                        <button class="view-all-btn" onclick="showApplicationsScreen()">Barchasi</button>
                    </div>
                    <div id="recentAppsContainer">
                        </div>
                </section>
            </div>

            </main>

        <nav class="bottom-nav-new" id="bottomNav">
            <button class="nav-item-new active" data-screen="homeScreen" onclick="navigateTo('homeScreen')">
                <span class="material-symbols-outlined">home</span>
                <span class="nav-label-new">Asosiy</span>
            </button>
            <button class="nav-item-new" data-screen="mapScreen" onclick="showMapScreen()">
                <span class="material-symbols-outlined">explore</span>
                <span class="nav-label-new">Xarita</span>
            </button>
            <div class="nav-fab-container">
                <button class="nav-fab" onclick="startEPIFlow()">
                    <span class="material-symbols-outlined">add</span>
                </button>
            </div>
            <button class="nav-item-new" data-screen="applicationsScreen" onclick="showApplicationsScreen()">
                <span class="material-symbols-outlined">receipt_long</span>
                <span class="nav-label-new">Tarix</span>
            </button>
            <button class="nav-item-new" data-screen="settingsScreen" onclick="navigateTo('settingsScreen')">
                <span class="material-symbols-outlined">person</span>
                <span class="nav-label-new">Profil</span>
            </button>
        </nav>
    </div>

    <script src="./i18n.js"></script>
    <script src="./app.js"></script>
</body>
</html>
